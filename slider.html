<!DOCTYPE html>

    <meta charset="utf-8" />

    <style>
        .unforgettable-section .singleBar-slider,
        .unforgettable-section .unforgettable-slider {
            position: relative;
        }

            .unforgettable-section .singleBar-slider img,
            .unforgettable-section .unforgettable-slider img {
                width: 100%;
                -o-object-fit: cover;
                object-fit: cover;
            }

            .unforgettable-section .singleBar-slider figure,
            .unforgettable-section .unforgettable-slider figure {
                background-color: #0F1E4D;
                position: relative;
                height: 100%;
            }

                .unforgettable-section .singleBar-slider figure img,
                .unforgettable-section .unforgettable-slider figure img {
                    opacity: .5;
                    height: 100%;
                    width: 100%;
                    -o-object-fit: cover;
                    object-fit: cover;
                    -webkit-transition: all .2s;
                    transition: all .2s;
                }

                .unforgettable-section .singleBar-slider figure .btn,
                .unforgettable-section .unforgettable-slider figure .btn {
                    position: absolute;
                    left: 50%;
                    -webkit-transform: translateX(-50%);
                    -ms-transform: translate(-50%);
                    transform: translate(-50%);
                    bottom: 70px;
                    white-space: nowrap;
                    display: none;
                    opacity: 0;
                    -webkit-transition: all .5s;
                    transition: all .5s;
                }

            .unforgettable-section .singleBar-slider .current-child figure .btn,
            .unforgettable-section .singleBar-slider .current-child figure img,
            .unforgettable-section .singleBar-slider .prev-child figure .btn,
            .unforgettable-section .singleBar-slider .prev-child figure img,
            .unforgettable-section .unforgettable-slider .current-child figure .btn,
            .unforgettable-section .unforgettable-slider .current-child figure img,
            .unforgettable-section .unforgettable-slider .prev-child figure .btn,
            .unforgettable-section .unforgettable-slider .prev-child figure img {
                display: inline-block;
                opacity: 1;
            }

        .cover-banner .slick-arrow {
            text-shadow: 1px 1px 3px rgba(0,0,0,0.55);
        }

        .unforgettable-section .singleBar-slider .slick-arrow,
        .unforgettable-section .unforgettable-slider .slick-arrow {
            position: absolute;
            top: 50%;
            -webkit-transform: translateY(-50%);
            -ms-transform: translateY(-50%);
            transform: translateY(-50%);
            z-index: 99;
            font-size: 0;
            background-color: transparent;
            border: none;
            outline: 0;
            width: 55px;
            height: 30px;
            background-repeat: no-repeat;
            -webkit-transition: all .3s;
            transition: all .3s;
            cursor: pointer;
        }

            .unforgettable-section .singleBar-slider .slick-arrow.slick-prev,
            .unforgettable-section .unforgettable-slider .slick-arrow.slick-prev {
                left: 75px;
                background-image: url(/app/images/left-arrow.svg);
                background-position: center right;
            }

                .unforgettable-section .singleBar-slider .slick-arrow.slick-prev:hover,
                .unforgettable-section .unforgettable-slider .slick-arrow.slick-prev:hover {
                    background-position: center left;
                }

            .unforgettable-section .singleBar-slider .slick-arrow.slick-next,
            .unforgettable-section .unforgettable-slider .slick-arrow.slick-next {
                right: 75px;
                background-image: url(/app/images/right-arrow.svg);
                background-position: center left;
            }

        @media (max-width:992px) {
            .unforgettable-section .singleBar-slider .slick-arrow.slick-prev,
            .unforgettable-section .unforgettable-slider .slick-arrow.slick-prev {
                left: 15px;
            }

            .unforgettable-section .singleBar-slider .slick-arrow.slick-next,
            .unforgettable-section .unforgettable-slider .slick-arrow.slick-next {
                right: 15px;
            }
        }

        .unforgettable-section .singleBar-slider .slick-arrow.slick-next:hover,
        .unforgettable-section .unforgettable-slider .slick-arrow.slick-next:hover {
            background-position: center right;
        }

        .unforgettable-section .singleBar-slider .slick-dots,
        .unforgettable-section .unforgettable-slider .slick-dots {
            left: 50%;
            -webkit-transform: translateX(-50%);
            -ms-transform: translate(-50%);
            transform: translate(-50%);
            position: absolute;
            width: 600px;
            bottom: 40px;
            display: -webkit-box;
            display: -ms-flexbox;
            display: flex;
            -webkit-box-align: center;
            -ms-flex-align: center;
            align-items: center;
        }

            .experience-section .line,
            .unforgettable-section .singleBar-slider .slick-dots li button,
            .unforgettable-section .unforgettable-slider .slick-dots li button {
                display: none;
            }

            .unforgettable-section .singleBar-slider .slick-dots .bar,
            .unforgettable-section .unforgettable-slider .slick-dots .bar {
                position: absolute;
                height: 5px;
                background-color: #fff;
            }

        @media (max-width:768px) {
            .unforgettable-section .text-box {
                padding: 80px 15px 50px;
            }

                .unforgettable-section .text-box h2 {
                    margin: 10px 0;
                }

            .unforgettable-section .singleBar-slider figure .btn,
            .unforgettable-section .unforgettable-slider figure .btn {
                bottom: 40px;
            }

            .unforgettable-section .singleBar-slider .slick-dots,
            .unforgettable-section .unforgettable-slider .slick-dots {
                width: -webkit-calc(100% - 60px);
                width: calc(100% - 60px);
                bottom: -30px;
            }
        }

        .unforgettable-section .singleBar-slider .slick-dots li,
        .unforgettable-section .unforgettable-slider .slick-dots li {
            list-style: none;
            height: 2px;
            vertical-align: middle;
            background-color: #fff;
        }

        .discovery-section {
            padding: 100px 0;
        }

            .discovery-section h2 {
                width: 40%;
            }

            .discovery-section p {
                width: 60%;
            }
    </style>
</head>
